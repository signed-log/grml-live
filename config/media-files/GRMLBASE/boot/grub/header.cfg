set default=0
set timeout=20

if loadfont unicode ; then
   insmod png
   # Default to a "small" resolution to avoid completely unreadable high-res modes.
   set gfxmode=1280x1024,1024x768,auto
 
   if [ "${grub_platform}" == "efi" ] ; then
     insmod efi_gop
   fi
   if [ "${grub_platform}" == "pc" ] ; then
     # x86 BIOS boot only
     insmod vbe
     insmod video_bochs
     insmod video_cirrus
   fi

   insmod gfxterm
   terminal_output gfxterm
fi

if [ "${grub_platform}" == "efi" ] ; then
  if [ "${grml_secureboot}" = "true" ] ; then
    set grmltheme=uefisec
  else
    set grmltheme=uefi
  fi
else
  set grmltheme=bios
fi

# custom branding
set theme="${prefix}/grml-theme/${grmltheme}.txt"
export theme

if [ ${iso_path} ] ; then
    set loopback="findiso=${iso_path}"
    export loopback
fi
